name: build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: show repo structure
        run: ls -R
        
      - name: build ipa
        run: |
          xcodebuild \
            -project tree/main/lara.xcodeproj \
            -scheme lara \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            -archivePath build/lara.xcarchive

          xcodebuild -exportArchive \
            -archivePath build/lara.xcarchive \
            -exportPath build \
            -exportOptionsPlist /dev/stdin <<EOF
          {
            "method": "development"
          }
          EOF

      - name: generate build id
        id: buildid
        run: echo "id=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: collect commits
        run: |
          git log --since="12 hours ago" --pretty=format:"- %h %s (%an)" > notes.txt

      - name: archive old latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            echo "archiving previous latest"
            IPA=$(gh release download latest -p "*.ipa" -D old_release | head -n1)
            gh release create "release-${{ steps.buildid.outputs.id }}-old" "$IPA" \
              --title "release ${{ steps.buildid.outputs.id }} (old)" \
              --notes "archived previous release"
            gh release delete latest -y
            git push origin :refs/tags/latest || true
          fi

      - name: create new latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IPA=$(find build -name "*.ipa" | head -n1)
          gh release create latest "$IPA" \
            --title "latest build (${{ steps.buildid.outputs.id }})" \
            --notes-file notes.txt
